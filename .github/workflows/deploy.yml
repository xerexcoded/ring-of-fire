name: Deploy to Xenix

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: xenix-production
  cancel-in-progress: false

env:
  REVISION: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    name: Deploy tested revision to Xenix
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure restricted deployment key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/xenix-deploy
          chmod 600 ~/.ssh/xenix-deploy
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Deploy the CI-tested revision
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          REVISION: ${{ env.REVISION }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          ssh -i ~/.ssh/xenix-deploy -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" "deploy $REVISION"
