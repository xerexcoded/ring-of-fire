name: Publish and deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: restless-pacific-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/restless-pacific-backend
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/restless-pacific-web
  REVISION: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  publish:
    name: Publish immutable images
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
          - name: web
            context: web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REVISION }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/restless-pacific-${{ matrix.name }}:sha-${{ env.REVISION }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_METABASE_URL=${{ vars.NEXT_PUBLIC_METABASE_URL }}
            NEXT_PUBLIC_REPOSITORY_URL=${{ vars.NEXT_PUBLIC_REPOSITORY_URL }}
          cache-from: type=gha,scope=production-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=production-${{ matrix.name }}
          provenance: true
          sbom: true

  deploy:
    name: Deploy after approval
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/restless-pacific
          chmod 600 ~/.ssh/restless-pacific
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Deploy pinned commit and images
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REVISION: ${{ env.REVISION }}
        run: |
          ssh -i ~/.ssh/restless-pacific "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REVISION='$REVISION' GITHUB_REPOSITORY_OWNER='${{ github.repository_owner }}' sh -s" <<'REMOTE'
          set -eu
          cd "$DEPLOY_PATH"
          git fetch --prune origin "$REVISION"
          git checkout --detach "$REVISION"
          export BACKEND_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/restless-pacific-backend:sha-${REVISION}"
          export WEB_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/restless-pacific-web:sha-${REVISION}"
          docker compose config --quiet
          docker compose stop scheduler || true
          docker compose pull postgres metabase caddy backend web
          docker compose up --detach --wait --wait-timeout 120 postgres
          docker compose --profile tools run --rm backend-seed
          docker compose up --detach --wait --wait-timeout 300 backend metabase
          docker compose --profile tools run --rm metabase-bootstrap
          docker compose up --detach --wait --wait-timeout 180 web caddy scheduler
          docker compose --profile ops up --detach --build --wait --wait-timeout 180 backup
          docker image prune --force --filter 'until=168h'
          REMOTE
