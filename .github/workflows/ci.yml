name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-config:
    name: Repository configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Require executable container entrypoints
        run: |
          test -x infra/postgres/init/00-create-databases.sh
          test -x infra/backup/backup-once
          test -x infra/backup/backup-loop
          test -x infra/scripts/smoke
      - name: Validate Compose model
        run: docker compose --env-file .env.example config --quiet
      - name: Reject floating production images
        run: |
          ! grep -R --line-number -E 'image: .*:(latest|beta)([[:space:]]|$)' docker-compose.yml infra
          grep -F 'metabase/metabase:v0.62.4.3' docker-compose.yml

  backend:
    name: Clojure tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clojure-${{ runner.os }}-${{ hashFiles('backend/deps.edn') }}
          restore-keys: clojure-${{ runner.os }}-
      - name: Resolve dependencies
        working-directory: backend
        run: clojure -P -M:test
      - name: Start PostGIS
        run: docker compose --env-file .env.example up --detach --wait --wait-timeout 120 postgres
      - name: Seed the reviewed atlas fixture
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/ring_data
          DATABASE_USER: ring_writer
          DATABASE_PASSWORD: dev-only-ring-writer-change-me
        run: clojure -M:ingest seed
      - name: Test
        working-directory: backend
        env:
          TEST_DATABASE_URL: jdbc:postgresql://localhost:5432/ring_data
          TEST_DATABASE_USER: ring_writer
          TEST_DATABASE_PASSWORD: dev-only-ring-writer-change-me
          TEST_METABASE_READER_PASSWORD: dev-only-metabase-reader-change-me
        run: clojure -M:test
      - name: Stop test database
        if: always()
        run: docker compose --env-file .env.example down --volumes --remove-orphans

  web:
    name: Next.js checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Lint and typecheck
        working-directory: web
        run: npm run lint && npm run typecheck
      - name: Unit tests
        working-directory: web
        run: npm test
      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Browser and accessibility tests
        working-directory: web
        run: npm run test:e2e
      - name: Production build
        working-directory: web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://api.example.test/api/v1
          NEXT_PUBLIC_METABASE_URL: http://analytics.example.test
          METABASE_EMBEDDING_SECRET: ci-server-only-canary-never-ship-this-value
        run: npm run build
      - name: Confirm backend secret is absent from browser output
        working-directory: web
        run: |
          if grep -R -F 'ci-server-only-canary-never-ship-this-value' .next; then
            echo 'Server-only Metabase secret leaked into the Next.js build.' >&2
            exit 1
          fi

  images:
    name: Container images
    runs-on: ubuntu-latest
    needs: [repository-config, backend, web]
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
          - name: web
            context: web
          - name: backup
            context: infra/backup
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: restless-pacific/${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
